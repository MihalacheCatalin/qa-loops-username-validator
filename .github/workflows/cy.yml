name: Executa Validatorul Java

on: [push]

jobs:
  run-validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Seteaza Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compileaza si Ruleaza
        run: |
          # Compilam codul sursa
          javac src/test/java/com/catalinmihalache/homework/UsernameValidator.java
          
          # Trimitem input-uri automate pentru a simula utilizatorul:
          # 1. "user cu spatiu" (incorect)
          # 2. "scurt" (incorect)
          # 3. "valid123" (CORECT)
          echo -e "user cu spatiu\nscurt\nvalid123" | java -cp src/test/java com.catalinmihalache.homework.UsernameValidator
